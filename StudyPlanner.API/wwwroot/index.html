<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Study Planner System</title>
    <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
    <div id="auth-screen" class="auth-screen">
        <div class="auth-card">
            <h1>Study Planner</h1>
            <p class="subtitle">Organize subjects, tasks, goals and track your progress</p>
            <div class="tabs">
                <button type="button" class="tab active" data-tab="login">Login</button>
                <button type="button" class="tab" data-tab="register">Register</button>
            </div>
            <form id="login-form" class="auth-form">
                <input type="email" id="login-email" placeholder="Email" required />
                <input type="password" id="login-password" placeholder="Password" required />
                <button type="submit">Sign in</button>
            </form>
            <form id="register-form" class="auth-form hidden">
                <input type="text" id="reg-first" placeholder="First name" required />
                <input type="text" id="reg-last" placeholder="Last name" required />
                <input type="email" id="reg-email" placeholder="Email" required />
                <input type="password" id="reg-password" placeholder="Password" required />
                <input type="password" id="reg-confirm" placeholder="Confirm password" required />
                <button type="submit">Create account</button>
            </form>
            <p class="demo-hint">Demo: student1@studyplanner.com / Student@12345</p>
            <p id="auth-error" class="error hidden"></p>
        </div>
    </div>

    <div id="app" class="app hidden">
        <aside class="sidebar">
            <div class="brand">Study Planner</div>
            <nav>
                <button type="button" class="nav-btn active" data-view="dashboard">Dashboard</button>
                <button type="button" class="nav-btn" data-view="subjects">Subjects</button>
                <button type="button" class="nav-btn" data-view="tasks">Tasks</button>
                <button type="button" class="nav-btn" data-view="goals">Goals</button>
                <button type="button" class="nav-btn" data-view="sessions">Sessions</button>
                <button type="button" class="nav-btn" data-view="achievements">Achievements</button>
            </nav>
            <div class="user-box">
                <span id="user-name"></span>
                <button type="button" id="logout-btn">Logout</button>
            </div>
        </aside>
        <main class="content">
            <header class="topbar">
                <h2 id="view-title">Dashboard</h2>
                <span id="global-error" class="error hidden"></span>
            </header>
            <section id="view-dashboard" class="view"></section>
            <section id="view-subjects" class="view hidden"></section>
            <section id="view-tasks" class="view hidden"></section>
            <section id="view-goals" class="view hidden"></section>
            <section id="view-sessions" class="view hidden"></section>
            <section id="view-achievements" class="view hidden"></section>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
